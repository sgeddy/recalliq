[build]
builder = "nixpacks"
buildCommand = "cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @recalliq/db build && pnpm --filter @recalliq/srs-engine build && pnpm --filter @recalliq/types build && pnpm --filter @recalliq/api build"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
